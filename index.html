<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>💗 Sana Bir Sürpriz</title>
<meta name="description" content="Senin için dönen bir kalp 💗" />
<!-- Open Graph: paylaşıldığında önizleme -->
<meta property="og:title" content="💗 Sana özel bir sürpriz var" />
<meta property="og:description" content="Aç ve gör 💗" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=11" />
</head>
<body>

  <!-- ARKA PLAN: GALAKSİ + KAYAN YILDIZLAR -->
  <div class="galaxy"></div>
  <div class="starfield">
    <div class="star-layer" id="sl1"></div>
    <div class="star-layer" id="sl2"></div>
    <div class="star-layer" id="sl3"></div>
  </div>
  <div class="falling" id="falling"></div>

  <!-- KUYRUKLU YILDIZLAR -->
  <div class="comets">
    <span class="comet c1"></span>
    <span class="comet c2"></span>
    <span class="comet c3"></span>
  </div>

  <!-- İKİ İSİM + KALP -->
  <div class="nameTag" id="nameTag"></div>

  <!-- SAHNE: HALAY ÇEKEN İKİ KALP -->
  <div class="scene">
    <div class="halo"></div>
    <div class="dance-pair">

      <!-- Sol kalp: ERKEK (silindir şapka + papyon) -->
      <div class="enter e1">
        <div class="dancer d1">
          <div class="hat"></div>
          <div class="arm arm-out"></div>
          <div class="arm arm-in"></div>
          <div class="leg leg-l"></div>
          <div class="leg leg-r"></div>
          <div class="body">
            <div class="face">
              <span class="eye"></span><span class="eye"></span>
              <span class="cheek cheek-l"></span><span class="cheek cheek-r"></span>
              <span class="mouth"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Sağ kalp: KADIN (saç fiyongu + kirpik, mendil sallıyor) -->
      <div class="enter e2">
        <div class="dancer d2">
          <div class="bow"></div>
          <div class="arm arm-in"></div>
          <div class="arm arm-out"><div class="mendil"></div></div>
          <div class="leg leg-l"></div>
          <div class="leg leg-r"></div>
          <div class="body">
            <div class="face">
              <span class="eye"></span><span class="eye"></span>
              <span class="cheek cheek-l"></span><span class="cheek cheek-r"></span>
              <span class="mouth lips"></span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- MÜZİK / SES (opsiyonel) -->
  <button class="muteBtn" id="muteBtn" title="Ses aç/kapat">🔊</button>

  <!-- KONTROL PANELİ (kendi kartını oluştur) -->
  <button class="openPanel" id="openPanel">✏️ Kendin oluştur</button>

  <div class="panel" id="panel">
    <div class="panel-inner">
      <h2>💗 Kendi kartını oluştur</h2>
      <div class="two">
        <div>
          <label>1. İsim</label>
          <input id="inN1" type="text" maxlength="16" placeholder="Ahmet" />
        </div>
        <div>
          <label>2. İsim</label>
          <input id="inN2" type="text" maxlength="16" placeholder="Ayşe" />
        </div>
      </div>

      <label>Renk</label>
      <div class="colors" id="colors"></div>

      <div class="row">
        <button class="btn primary" id="applyBtn">Uygula</button>
        <button class="btn" id="shareBtn">🔗 Linki kopyala</button>
      </div>
      <p class="hint" id="hint">Linki kopyalayıp arkadaşına gönder, açtığında bu mesajı görecek 💌</p>
      <button class="close" id="closePanel">✕</button>
    </div>
  </div>

  <script src="script.js?v=11"></script>
</body>
</html>
